name: Bug Report
description: Report a bug in SentinelX
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `sentinelx-cli scan`
        2. Observe error in output
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Linux distribution and version.
      placeholder: "Ubuntu 24.04 LTS"
    validations:
      required: true

  - type: input
    id: kernel-version
    attributes:
      label: Kernel Version
      description: Output of `uname -r`.
      placeholder: "6.8.0-40-generic"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`.
      placeholder: "rustc 1.75.0 (82e1608df 2023-12-21)"
    validations:
      required: true

  - type: input
    id: sentinelx-version
    attributes:
      label: SentinelX Version
      description: Output of `sentinelx-cli --version` or the version from Cargo.toml.
      placeholder: "sentinelx-cli 1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
