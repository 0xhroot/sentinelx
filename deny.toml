# cargo-deny configuration for SentinelX
# https://embarkstudios.github.io/cargo-deny/
# Compatible with cargo-deny 0.20+

[graph]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# RUSTSEC-2023-0071: rsa 0.9.10 — Marvin Attack timing sidechannel.
# rsa is an optional dep of sqlx-mysql (not compiled; SentinelX uses sqlite only).
# No upstream fix available. Safe to ignore. See .cargo/audit.toml for full rationale.
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "rsa is an optional dep of sqlx-mysql, never compiled. No upstream fix." },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "GPL-3.0-or-later",
    "GPL-2.0-or-later",
    "LGPL-2.1-or-later",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "CC-PDDC",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
exceptions = [
    { allow = ["MIT", "Apache-2.0"], crate = "tokio" },
    { allow = ["MIT", "Apache-2.0"], crate = "tower" },
    { allow = ["MIT", "Apache-2.0"], crate = "axum" },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
