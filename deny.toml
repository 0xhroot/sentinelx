# cargo-deny configuration for SentinelX
# https:// Embden.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "GPL-3.0-or-later",
    "GPL-2.0-or-later",
    "LGPL-2.1-or-later",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "CC-PDDC",
    "MIT OR Apache-2.0",
    "MIT OR Zlib OR Apache-2.0",
    "Apache-2.0 OR MIT",
    "Unicode-3.0 OR Unicode-DFS-2016",
]
deny = [
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "SSPL-1.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = []

[target.'cfg(target_os = "windows")'.dependencies]
# No Windows-specific deny rules needed yet

[target.'cfg(target_os = "macos")'.dependencies]
# No macOS-specific deny rules needed yet
