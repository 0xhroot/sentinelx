# SentinelX Configuration
# Documentation: https://docs.sentinelx.dev/configuration

[general]
# Host to bind the API server to
host = "127.0.0.1"
# Port for the API server
port = 8443

[detection]
# Enable/disable specific detection engines
process_scan = true
module_scan = true
network_scan = true
kernel_integrity = true
memory_integrity = true
file_integrity = true
persistence_scan = true

[monitoring]
# Scan interval in seconds (for continuous monitoring)
interval_seconds = 60
# Maximum concurrent scans
max_concurrent = 4

[storage]
# SQLite database path
database_path = "/var/lib/sentinelx/sentinelx.db"

[api]
# CORS origins (empty = same-origin only)
cors_origins = []

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

[ebpf]
# eBPF sensor settings
enabled = true
# Maximum events per second
max_events_per_second = 10000
