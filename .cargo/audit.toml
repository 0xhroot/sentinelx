# cargo-audit configuration for SentinelX
# https://docs.rs/cargo-audit/latest/cargo_audit/

[advisories]
# RUSTSEC-2023-0071: rsa 0.9.10 — Marvin Attack timing sidechannel
#
# WHY IGNORED:
# The `rsa` crate appears in Cargo.lock solely as an optional dependency of
# `sqlx-mysql`, which is itself an optional dependency of `sqlx`. SentinelX
# enables ONLY the `sqlite` feature for sqlx, so `sqlx-mysql` and `rsa` are
# never compiled or linked. The entry exists because Cargo.lock records all
# possible dependencies of each package, including optional ones.
#
# The `rsa` crate has a known timing sidechannel (CVE-2023-49092), but
# upstream has published no fix and the crate is effectively unmaintained.
# Since SentinelX never uses RSA operations, this advisory poses zero risk.
#
# SAFETY: This ignore will be removed automatically if upstream publishes a
# patched version, or if SentinelX ever adds a dependency that transitively
# enables rsa at compile time.
ignore = [
    "RUSTSEC-2023-0071",
]
